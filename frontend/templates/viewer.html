<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="{{.FilePath}}" />
        <meta property="og:title" content="{{.FilePath | base}}" />
        <meta property="og:type" content="article" />
        <title>{{.FilePath}} - Claude Review</title>
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body{{if .ScratchMode}} data-scratch-mode="true" data-scratch-id="{{.ScratchID}}"{{end}}>
        <div class="breadcrumb">
            <span class="version-indicator" title="{{.Version}} ({{.CommitHash}})">{{.CommitHash}}</span>
            {{if .ScratchMode}}
                <span class="scratch-label">Annotate: {{if .ScratchLabel}}{{.ScratchLabel}}{{else}}scratch buffer{{end}}</span>
                <button id="scratch-send-btn" class="comment-btn comment-btn-primary" title="Send to agent (⌘↩)">Send to agent ⌘↩</button>
                <button id="scratch-send-continue-btn" class="comment-btn" title="Send annotations and keep the browser open — agent will reply in each thread (⌥↩)">Send &amp; Continue ⌥↩</button>
            {{else}}
                <a href="/">Home</a>
                <span class="breadcrumb-separator">›</span>
                <a href="/projects{{.ProjectDir | pathescape}}">{{.ProjectDir | base}}</a>
                <span class="breadcrumb-separator">›</span>
                <span>{{.FilePath}}</span>
                <button id="copy-markdown-btn" class="copy-markdown-btn" title="Copy as markdown">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                    </svg>
                    <span class="copy-label">Copy</span>
                </button>
            {{end}}
        </div>

        <div id="editor-toolbar" style="display: none;">
            <span class="editor-mode-label">Edit Mode</span>
            <div class="editor-format-group">
                <button class="editor-format-btn" data-format="p" title="Paragraph (Cmd+0)">P</button>
                <button class="editor-format-btn" data-format="h1" title="Heading 1 (Cmd+1)">H1</button>
                <button class="editor-format-btn" data-format="h2" title="Heading 2 (Cmd+2)">H2</button>
                <button class="editor-format-btn" data-format="h3" title="Heading 3 (Cmd+3)">H3</button>
                <button class="editor-format-btn" data-format="h4" title="Heading 4 (Cmd+4)">H4</button>
            </div>
            <button id="editor-raw-toggle" class="comment-btn">Raw</button>
            <button id="editor-save-btn" class="comment-btn comment-btn-primary">Save</button>
            <button id="editor-cancel-btn" class="comment-btn">Cancel</button>
            <span class="editor-hint">Cmd+S to save · Escape to cancel</span>
        </div>

        <article>
            <div id="markdown-content">{{.HTMLContent}}</div>
        </article>
        <textarea id="editor-raw-textarea" style="display: none;" spellcheck="false"></textarea>

        <!-- Comment panel (created in HTML to avoid blink on load) -->
        <div id="comment-panel" class="expanded ready">
            <div class="comment-panel-header">
                <div class="comment-panel-header-left">
                    <h3>Comments</h3>
                    <span class="comment-count">0</span>
                </div>
                <button class="panel-minimize-btn" title="Minimize panel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </button>
                <button class="panel-resize-btn" title="Resize panel">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="panel-icon panel-left-open"
                    >
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M9 3v18" />
                        <path d="m14 9 3 3-3 3" />
                    </svg>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="panel-icon panel-right-open"
                    >
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M15 3v18" />
                        <path d="m10 15-3-3 3-3" />
                    </svg>
                </button>
            </div>
            <div class="comment-panel-list"></div>
        </div>

        <script>
            // Template variables from Go backend
            window.crScratch = {{if .ScratchMode}}{ id: {{.ScratchID | json}}, label: {{.ScratchLabel | json}} }{{else}}null{{end}};
            const projectDir = {{.ProjectDir | json}};
            const filePath = {{.FilePath | json}};
            let comments = {{.Comments | json}};
        </script>

        <!-- Application logic -->
        <script defer src="/static/viewer.js"></script>
        <script defer src="/static/keyboard-nav.js"></script>
        <script defer src="/static/selection.js"></script>
        <script defer src="/static/keyboard-comments.js"></script>
        <script defer src="/static/annotate.js"></script>
        <script defer src="/static/keyboard-help.js"></script>
        <script defer src="/static/vendor/turndown.js"></script>
        <script defer src="/static/editor.js"></script>
    </body>
</html>
